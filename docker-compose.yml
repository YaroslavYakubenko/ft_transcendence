# defines Docker services for:
# Django backend 
# PostgreSQL(db)
# NginX (reverse proxy with SSL termination)
# Vite frontend (dev server)
# Prometheus (monitoring)
# Grafana (visualization)
# Node Exporter (host metrics)
# cAdvisor (container metrics)
# Each service has health checks and depends_on to ensure proper startup order.

services:
  db:
    image: postgres:16
    container_name: transcendence_db
    restart: unless-stopped

    # DB credentials used by PostgreSQL container (must match Django env)
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    # Persist database data across container restarts
    volumes:
      - postgres_data:/var/lib/postgresql/data

    # Expose DB port (optional, mainly for local debugging)
    ports:
      - "5432:5432"
    
    # health check
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer:4
    container_name: transcendence_adminer
    restart: unless-stopped

    environment:
      ADMINER_DEFAULT_SERVER: db

    ports:
      - "127.0.0.1:8082:8080"

    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    container_name: transcendence_backend
    restart: unless-stopped

    # Load Django environment variables
    env_file:
      - ./backend/.env

    volumes:
      # Mount backend code for live development
      - ./backend:/app

      # Persist uploaded media (avatars, etc.)
      - media_data:/app/media

    # Expose Django app
    ports:
      - "8000:8000"

    # Ensure DB container starts first (entrypoint still waits for readiness)
    depends_on:
      db:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:stable-alpine
    container_name: transcendence_nginx
    restart: unless-stopped

    # Mount custom nginx config and SSL certs
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

    # Expose nginx on standard HTTP and HTTPS ports
    ports:
      - "8080:80"
      - "8443:443"

    # Ensure backend is healthy before starting nginx
    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://127.0.0.1/api/health/ | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: transcendence_nginx_exporter
    restart: unless-stopped
    command:
      - --nginx.scrape-uri=http://nginx/nginx_status
    ports:
      - "9113:9113"
    depends_on:
      nginx:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: transcendence_frontend
    restart: unless-stopped
    
    # Load frontend environment variables
    env_file:
      - ./frontend/.env

    volumes:
      # Mount frontend code for live development
      - ./frontend:/app
      - /app/node_modules # Persist node_modules to avoid re-installing on every change

    # Expose Vite dev server
    ports:
      - "5173:5173"
    
    depends_on:
      backend:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus:latest
    container_name: transcendence_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9090 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana:latest
    container_name: transcendence_grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  node_exporter:
    image: prom/node-exporter:latest
    container_name: transcendence_node_exporter
    restart: unless-stopped
    command:
    - '--path.rootfs=/host'
    volumes:
    - /:/host:ro,rslave
    ports:
    - "9100:9100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9100 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
  
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: transcendence_cadvisor
    privileged: true
    restart: unless-stopped
    ports:
    - "8081:8080"
    volumes:
    - /:/rootfs:ro
    - /sys:/sys:ro
    - /var/lib/docker:/var/lib/docker:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - /dev/disk:/dev/disk:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

# Named volumes for persistence
volumes:
  postgres_data:
  media_data:
  prometheus_data:
  grafana_data: